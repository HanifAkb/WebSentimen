services:
  - type: web
    name: prediksi-sentimen-web
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn sentiment_site.wsgi:application --bind 0.0.0.0:$PORT
    autoDeploy: true
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SESSION_COOKIE_SECURE
        value: "1"
      - key: DJANGO_CSRF_COOKIE_SECURE
        value: "1"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "1"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "1"
      - key: DJANGO_SECURE_HSTS_PRELOAD
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: prediksi-sentimen-db
          property: connectionString

databases:
  - name: prediksi-sentimen-db
    plan: free
    databaseName: prediksi_sentimen
    user: prediksi_sentimen_user
